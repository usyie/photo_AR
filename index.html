<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>photo_AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="./effect.js"></script>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
        touch-action: none;
      }

            body {
        position: fixed;
        inset: 0;
        min-width: 100vw;
        min-height: 100vh;
      }

      #arRoot {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
      }

      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        display: block;
        overflow: hidden !important;
        background: transparent !important;
      }

      .a-canvas,
      canvas,
      video {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
      }

      video {
        object-fit: cover !important;
        object-position: center center !important;
      }

      canvas,
      .a-canvas {
        display: block !important;
      }

      .mindar-ui-overlay,
      .mindar-ui-loading,
      .mindar-ui-scanning {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
      }

      .a-enter-vr,
      .a-enter-ar {
        display: none !important;
      }

      #startButton {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        padding: 16px 28px;
        font-size: 20px;
        border-radius: 999px;
        border: none;
        background: #fff;
        color: #111;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>

  <body>
    <div id="arRoot">
      <button id="startButton" type="button">AR&#x30B9;&#x30BF;&#x30FC;&#x30C8;</button>

      <a-scene
        id="scene"
        mindar-image="imageTargetSrc: ./target.mind; autoStart: false; uiScanning: yes; uiLoading: yes; filterMinCF: 0.0001; filterBeta: 0.001"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: true"
        embedded
        renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
        color-space="sRGB"
      >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
          <a-entity
            id="sparkleFrame"
            sparkle-frame="shape: fan; width: 1.1; height: 0.52; depth: 0.035; sparkleCount: 84; notchWidth: 0.38; notchDepth: 0.055; cloud: false; cloudOpacity: 0.18"
          ></a-entity>
        </a-entity>
      </a-scene>
    </div>

    <script>
      (() => {
        const startButton = document.getElementById("startButton");
        const sceneEl = document.getElementById("scene");
        const rootEl = document.getElementById("arRoot");

        const getViewportSize = () => {
          const visualViewport = window.visualViewport;
          return {
            width: Math.round(
              visualViewport?.width || window.innerWidth || document.documentElement.clientWidth
            ),
            height: Math.round(
              visualViewport?.height || window.innerHeight || document.documentElement.clientHeight
            ),
          };
        };

        const fitElement = (element, size) => {
          if (!element) return;

          element.style.position = "fixed";
          element.style.left = "0";
          element.style.top = "0";
          element.style.right = "auto";
          element.style.bottom = "auto";
          element.style.width = `${size.width}px`;
          element.style.height = `${size.height}px`;
          element.style.maxWidth = "none";
          element.style.maxHeight = "none";
          element.style.margin = "0";
          element.style.transform = "none";
        };

        const syncArViewport = () => {
          const size = getViewportSize();

          fitElement(document.documentElement, size);
          fitElement(document.body, size);
          fitElement(rootEl, size);
          fitElement(sceneEl, size);

          document
            .querySelectorAll(
              "video, canvas, .a-canvas, .mindar-ui-overlay, .mindar-ui-loading, .mindar-ui-scanning"
            )
            .forEach((element) => fitElement(element, size));

          const video = document.querySelector("video");
          if (video) {
            video.style.objectFit = "cover";
            video.style.objectPosition = "center center";
            video.setAttribute("playsinline", "");
            video.setAttribute("webkit-playsinline", "");
          }

          if (sceneEl.renderer) {
            sceneEl.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            sceneEl.renderer.setSize(size.width, size.height, false);
          }

          if (sceneEl.camera) {
            sceneEl.camera.aspect = size.width / size.height;
            sceneEl.camera.updateProjectionMatrix();
          }

          sceneEl.resize?.();
        };

        let resizeTimer = 0;
        const scheduleSync = () => {
          window.clearTimeout(resizeTimer);
          syncArViewport();
          resizeTimer = window.setTimeout(syncArViewport, 120);
        };

        startButton.addEventListener("click", async () => {
          try {
            scheduleSync();
            const system = sceneEl.systems["mindar-image-system"];
            await system.start();
            startButton.style.display = "none";
            scheduleSync();
          } catch (error) {
            alert(`AR start failed: ${error.name}`);
            console.error(error);
          }
        });

        sceneEl.addEventListener("loaded", scheduleSync);
        sceneEl.addEventListener("renderstart", scheduleSync);
        window.addEventListener("load", scheduleSync);
        window.addEventListener("resize", scheduleSync);
        window.addEventListener("orientationchange", () => {
          window.setTimeout(scheduleSync, 250);
        });
        window.visualViewport?.addEventListener("resize", scheduleSync);
        window.visualViewport?.addEventListener("scroll", scheduleSync);

        const observer = new MutationObserver(scheduleSync);
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
